name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate package-manager metadata
        run: |
          scripts/generate-package-manager-artifacts.sh \
            --version "${GITHUB_REF_NAME}" \
            --checksums dist/checksums.txt \
            --output-dir .sloppad/artifacts/package-managers

      - name: Upload package-manager metadata
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-metadata-${{ github.ref_name }}
          path: .sloppad/artifacts/package-managers/
