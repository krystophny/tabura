version: 2
project_name: sloppad

builds:
  - id: sloppad
    main: ./cmd/sloppad
    binary: sloppad
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}

archives:
  - id: sloppad
    ids:
      - sloppad
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "sloppad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - scripts/piper_tts_server.py
      - scripts/lib/llama.sh
      - scripts/setup-local-llm.sh
      - deploy/launchd/*.plist

checksum:
  name_template: checksums.txt

release:
  github:
    owner: krystophny
    name: sloppad
  replace_existing_artifacts: true
  extra_files:
    - glob: ./scripts/install.sh
      name_template: install.sh
    - glob: ./scripts/install.ps1
      name_template: install.ps1
  draft: false
  prerelease: auto

changelog:
  use: github-native

brews:
  - repository:
      owner: krystophny
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/krystophny/sloppad
    description: Local-first voice assistant with canvas UI
    license: MIT
    install: |
      bin.install "sloppad"
    caveats: |
      Run `sloppad server` or use the full installer:
        curl -fsSL https://github.com/krystophny/sloppad/releases/latest/download/install.sh | bash
      Requires codex app-server and Python 3.10+ for Piper TTS.
