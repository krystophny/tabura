<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slopshell Harness</title>
  <link rel="stylesheet" href="../../internal/web/static/style.css">
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="view-main" class="view">

      <div id="workspace">
        <aside id="pr-file-pane" aria-label="File sidebar">
          <div id="pr-file-list" class="pr-file-list"></div>
        </aside>
        <div id="canvas-column">
          <div id="pr-file-drawer-backdrop" aria-hidden="true"></div>
          <div id="canvas-viewport">
            <section id="canvas-text" class="canvas-pane" aria-label="Text artifact"></section>
            <section id="canvas-image" class="canvas-pane" aria-label="Image artifact"><img id="canvas-img" alt="artifact"></section>
            <section id="canvas-pdf" class="canvas-pane" aria-label="PDF artifact"></section>
            <canvas id="ink-layer" class="ink-layer" aria-hidden="true"></canvas>
          </div>
          <div id="ink-controls" class="ink-controls" style="display:none">
            <button id="ink-clear" type="button" class="edge-btn">Clear Ink</button>
            <button id="ink-submit" type="button" class="edge-btn">Submit Ink</button>
          </div>
        </div>
      </div>

      <section id="companion-idle-surface" class="companion-idle-surface" aria-hidden="true">
        <div class="companion-idle-shell">
          <div class="companion-idle-frame">
            <div class="companion-idle-face" aria-hidden="true">
              <div class="companion-idle-brow companion-idle-brow-left"></div>
              <div class="companion-idle-brow companion-idle-brow-right"></div>
              <div class="companion-idle-eye companion-idle-eye-left"><span class="companion-idle-pupil"></span></div>
              <div class="companion-idle-eye companion-idle-eye-right"><span class="companion-idle-pupil"></span></div>
              <div class="companion-idle-mouth"></div>
            </div>
          </div>
        </div>
      </section>

      <div id="indicator" class="indicator" style="display:none">
        <span class="record-dot"></span>
        <span class="stop-square"></span>
        <span class="pause-bars"></span>
      </div>

      <textarea id="floating-input" class="floating-input" style="display:none" rows="1" placeholder=""></textarea>

      <div id="overlay" class="overlay" style="display:none">
        <div class="overlay-content"></div>
      </div>

      <div id="slopshell-circle" class="slopshell-circle" aria-label="Slopshell Circle">
        <div id="slopshell-circle-menu" class="slopshell-circle-menu" aria-label="Slopshell Circle menu">
          <button id="slopshell-circle-segment-dialogue" class="slopshell-circle-segment" type="button" data-kind="session" data-segment="dialogue"></button>
          <button id="slopshell-circle-segment-meeting" class="slopshell-circle-segment" type="button" data-kind="session" data-segment="meeting"></button>
          <button id="slopshell-circle-segment-silent" class="slopshell-circle-segment" type="button" data-kind="toggle" data-segment="silent"></button>
          <button id="slopshell-circle-segment-fast" class="slopshell-circle-segment" type="button" data-kind="toggle" data-segment="fast"></button>
          <button id="slopshell-circle-segment-prompt" class="slopshell-circle-segment" type="button" data-kind="tool" data-segment="prompt"></button>
          <button id="slopshell-circle-segment-text-note" class="slopshell-circle-segment" type="button" data-kind="tool" data-segment="text_note"></button>
          <button id="slopshell-circle-segment-pointer" class="slopshell-circle-segment" type="button" data-kind="tool" data-segment="pointer"></button>
          <button id="slopshell-circle-segment-highlight" class="slopshell-circle-segment" type="button" data-kind="tool" data-segment="highlight"></button>
          <button id="slopshell-circle-segment-ink" class="slopshell-circle-segment" type="button" data-kind="tool" data-segment="ink"></button>
        </div>
        <button id="slopshell-circle-dot" type="button" class="slopshell-circle-dot" aria-label="Toggle Slopshell Circle"></button>
      </div>
      <button id="surface-toggle" type="button" class="surface-toggle" aria-label="Switch interaction surface" style="display:none"></button>

      <button id="edge-left-tap" type="button" class="edge-left-tap" aria-label="Toggle file sidebar"></button>
      <button id="edge-right-tap" type="button" class="edge-right-tap" aria-label="Toggle chat panel"></button>
      <button id="edge-top-tap" type="button" class="edge-top-tap" aria-label="Toggle top panel"></button>

      <div id="edge-top" class="edge-panel edge-top">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Runtime</span>
            <div id="edge-top-actions" class="edge-panel-actions">
              <div id="slopshell-circle-corner-controls" class="slopshell-circle-corner-controls" role="group" aria-label="Slopshell Circle corner"></div>
              <button id="bug-report-button" type="button" class="edge-btn edge-icon-btn" aria-label="Report bug" title="Report bug"></button>
              <button id="btn-edge-rasa" type="button" class="edge-btn">Tabula Rasa</button>
            </div>
          </div>
          <div id="edge-top-models" aria-label="Workspace runtime summary"></div>
          <div id="edge-top-projects"></div>
        </div>
      </div>

      <div id="edge-right" class="edge-panel edge-right">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Log</span>
            <span id="status-label" class="status-label"></span>
          </div>
          <div id="chat-history" aria-live="polite"></div>
          <div class="chat-pane-input-row">
            <textarea id="chat-pane-input" rows="1" placeholder="Message..."></textarea>
          </div>
        </div>
      </div>

      <div id="toolbar" style="display:none">
        <div id="project-tab-strip" role="tablist" aria-label="Workspaces"></div>
        <span id="status-text">ready</span>
        <span id="chat-mode-pill" class="badge">chat</span>
      </div>
      <section id="project-overview" class="project-overview is-hidden" style="display:none">
        <div id="project-cards" class="project-cards"></div>
        <form id="project-create-form" autocomplete="off" style="display:none"></form>
      </section>

    </div>
  </div>

  <script src="harness-setup.js"></script>
  <script src="harness-fixtures.js"></script>
  <script src="harness-pr-fixtures.js"></script>
  <script src="harness-routes-runtime.js"></script>
  <script src="harness-routes-domain.js"></script>
  <script src="harness-runtime.js"></script>
  <script type="module" src="../../internal/web/static/app.js"></script>
  <script>
    window.addEventListener('unhandledrejection', (ev) => {
      window.__harnessLog.push({ type: 'unhandled_rejection', message: String(ev.reason?.message || ev.reason) });
    });
  </script>
</body>
</html>
